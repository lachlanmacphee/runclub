<div class="container">
  <form
    hx-post="/api/participant/event/{{ .eventId }}"
    hx-target="#participants"
    hx-swap="afterbegin"
    hx-on::after-request="if(event.detail.successful) this.reset()"
  >
    <div>
      <label>Bib</label>
      <input name="bib" type="number" value="1" step="1" required />
    </div>
    <div>
      <label>Name</label>
      <input
        id="nameInput"
        name="name"
        type="text"
        placeholder="Begin typing to search past participants..."
        hx-post="/api/participant/find"
        hx-trigger="input changed delay:500ms, search"
        hx-target="#search-results"
        hx-swap="innerHTML"
        required
      />
      <table class="table">
        <thead>
          <tr>
            <th>Past Participants</th>
          </tr>
        </thead>
        <tbody id="search-results">
          <tr>
            <td>No results...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div>
      <label>Distance</label>
      <input name="distance" type="number" value="5.0" step="0.5" required />
    </div>
    <button type="submit">Add</button>
  </form>
  <button
    hx-get="/timing/{{ .eventId }}"
    hx-push-url="true"
    hx-target="#main"
    style="width: 100%; margin-bottom: 17px"
  >
    Start Timing
  </button>
  <table role="grid">
    <thead>
      <tr>
        <th>Bib</th>
        <th>Name</th>
        <th>Distance</th>
      </tr>
    </thead>
    <tbody id="participants">
      {{range $val := .participants}}
      <tr>
        <td>{{ $val.Bib }}</td>
        <td>{{ $val.Name }}</td>
        <td>{{ $val.Distance }}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
